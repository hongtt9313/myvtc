<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyVTC SDK Demo</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.gstatic.com" rel="preconnect" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="styles/sdk.css" rel="stylesheet"/>
</head>
<body>
<main class="sdk-demo-page">
    <section class="sdk-toolbar" aria-label="Đổi chế độ hiển thị SDK">
        <strong>MyVTC SDK</strong>
        <div class="sdk-layout-switch" aria-label="Chọn chế độ hiển thị">
            <button class="active" type="button" data-layout-btn="portrait" aria-label="Chế độ dọc">
                <i class="fa fa-mobile-screen-button"></i>
                Portrait
            </button>
            <button type="button" data-layout-btn="landscape" aria-label="Chế độ ngang">
                <i class="fa fa-gamepad"></i>
                Landscape
            </button>
        </div>
    </section>

    <section class="sdk-frame portrait" id="sdkFrame" data-layout="portrait" aria-label="MyVTC SDK">
        <div class="sdk-device-status" aria-hidden="true">
            <span>9:41</span>
            <span>
                <i class="fa fa-signal"></i>
                <i class="fa fa-wifi"></i>
                <i class="fa fa-battery-full"></i>
            </span>
        </div>

        <aside class="sdk-brand-panel" aria-label="MyVTC">
            <div class="sdk-brand-card">
                <img class="sdk-logo-img" src="icon/logo.png" alt="MyVTC"/>
                <p>Xác thực tài khoản</p>
            </div>
        </aside>

        <section class="sdk-app-panel">
            <section class="sdk-screen active" data-native-screen="splash">
                <div class="sdk-splash-content">
                    <img class="sdk-logo-img sdk-logo-img-large" src="icon/logo.png" alt="MyVTC"/>
                </div>
            </section>

            <section class="sdk-screen" data-native-screen="auth">
                <div class="sdk-auth-shell">
                    <header class="sdk-auth-header" id="sdkHeader"></header>
                    <section class="sdk-auth-content" id="sdkContent"></section>
                </div>
            </section>
        </section>
    </section>
</main>

<div class="sdk-toast" id="sdkToast" role="status" aria-live="polite"></div>
<script src="scripts/sdk.js"></script>
</body>
</html>
